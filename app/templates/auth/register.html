{% extends "base.html" %}

{% block title %}Register - MovieBook{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="container">
        <div class="auth-card auth-card-wide">
            <div class="auth-header">
                <p class="eyebrow">New account</p>
                <h1>Create your MovieBook profile.</h1>
            </div>

            <form method="POST" class="auth-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control form-control-lg" id="username" name="username" autocomplete="username" required>
                    </div>
                    <div class="col-md-6">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control form-control-lg" id="email" name="email" autocomplete="email" required>
                    </div>
                    <div class="col-md-6">
                        <label for="first_name" class="form-label">First Name</label>
                        <input type="text" class="form-control form-control-lg" id="first_name" name="first_name" autocomplete="given-name">
                    </div>
                    <div class="col-md-6">
                        <label for="last_name" class="form-label">Last Name</label>
                        <input type="text" class="form-control form-control-lg" id="last_name" name="last_name" autocomplete="family-name">
                    </div>
                    <div class="col-md-6">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" autocomplete="new-password" required>
                    </div>
                    <div class="col-md-6">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control form-control-lg" id="confirm_password" name="confirm_password" autocomplete="new-password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 mt-4">Register</button>
            </form>

            <p class="auth-footer-text">Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a></p>
        </div>
    </div>
</section>
{% endblock %}
